<section class="product-filters">
  <div class="product-filters__field">
    <span class="product-filters__label">Categoria</span>
    <app-custom-select
      label="Categoria"
      placeholder="Selecione uma categoria"
      emptyOptionLabel="Todas"
      [options]="categoryOptions()"
      [value]="filters().category"
      (valueChange)="onCategoryChange($event)"
    />
  </div>

  <div class="product-filters__field">
    <span class="product-filters__label">Status</span>
    <app-custom-select
      label="Status"
      placeholder="Selecione um status"
      emptyOptionLabel="Todos"
      [options]="statusOptions"
      [value]="filters().status"
      (valueChange)="onStatusChange($event)"
    />
  </div>

  <label class="product-filters__field">
    <span class="product-filters__label">Preco minimo</span>
    <input
      class="product-filters__control"
      type="number"
      [value]="filters().minPrice ?? ''"
      min="0"
      step="0.01"
      (input)="onMinPriceChange($event)"
    />
  </label>

  <label class="product-filters__field">
    <span class="product-filters__label">Preco maximo</span>
    <input
      class="product-filters__control"
      type="number"
      [value]="filters().maxPrice ?? ''"
      min="0"
      step="0.01"
      (input)="onMaxPriceChange($event)"
    />
  </label>

  <button class="product-filters__button" type="button" (click)="onReset()">Limpar filtros</button>
</section>

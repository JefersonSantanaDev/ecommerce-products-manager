<section class="product-form-page">
  <app-breadcrumb [items]="breadcrumbItems()" />

  <header class="product-form-page__header">
    <div class="product-form-page__header-copy">
      <h1>{{ pageTitle() }}</h1>
      <p>{{ pageDescription() }}</p>
    </div>

    <a class="product-form-page__back-button" routerLink="/products">
      <span aria-hidden="true">←</span>
      Voltar para lista
    </a>
  </header>

  @if (isLoadingProduct()) {
    <p>Carregando produto...</p>
  } @else {
    <form class="product-form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="product-form__intro">
        <img src="/assets/brand/logo-1.png" alt="ClapsTech" />
        <div class="product-form__intro-copy">
          <strong>{{ formIntroTitle() }}</strong>
          <p>{{ formIntroDescription() }}</p>
        </div>
      </div>

      <label class="product-form__col product-form__col--name">
        Nome
        <input type="text" formControlName="name" />
        <small class="product-form__error">
          @if (controls.name.touched && controls.name.hasError('required')) {
            Nome e obrigatorio.
          } @else if (controls.name.touched && controls.name.hasError('minlength')) {
            Nome precisa ter pelo menos 3 caracteres.
          } @else {
            &nbsp;
          }
        </small>
      </label>

      <label class="product-form__col product-form__col--image-url">
        URL da imagem
        <input type="text" formControlName="imageUrl" placeholder="https://exemplo.com/produto.jpg ou /assets/products/item.jpg" />
        <small class="product-form__error">
          @if (controls.imageUrl.touched && controls.imageUrl.hasError('required')) {
            URL da imagem e obrigatoria.
          } @else if (controls.imageUrl.touched && controls.imageUrl.hasError('pattern')) {
            Informe uma URL valida (http/https) ou caminho local iniciando com /assets/.
          } @else {
            &nbsp;
          }
        </small>
      </label>

      <label class="product-form__col product-form__col--category">
        Categoria
        <input type="text" formControlName="category" />
        <small class="product-form__error">
          @if (controls.category.touched && controls.category.hasError('required')) {
            Categoria e obrigatoria.
          } @else {
            &nbsp;
          }
        </small>
      </label>

      <label class="product-form__col product-form__col--price">
        Preco
        <input
          type="text"
          inputmode="decimal"
          placeholder="0,00"
          [value]="priceDisplay()"
          (focus)="onPriceFocus()"
          (input)="onPriceInput($event)"
          (blur)="onPriceBlur()"
        />
        <small class="product-form__error">
          @if (controls.price.touched && controls.price.hasError('required')) {
            Preco e obrigatorio.
          } @else if (controls.price.touched && controls.price.hasError('min')) {
            Preco deve ser maior que zero.
          } @else {
            &nbsp;
          }
        </small>
      </label>

      <div class="product-form__field product-form__col product-form__col--status">
        <span class="product-form__field-label">Status</span>
        <app-custom-select
          label="Status do produto"
          placeholder="Selecione o status"
          [options]="statusOptions"
          [value]="controls.status.value"
          (valueChange)="onStatusChange($event)"
        />
      </div>

      <label class="product-form__col product-form__col--stock">
        Estoque
        <input type="number" min="0" step="1" formControlName="stock" />
        <small class="product-form__error">
          @if (controls.stock.touched && controls.stock.hasError('required')) {
            Estoque e obrigatorio.
          } @else if (controls.stock.touched && controls.stock.hasError('min')) {
            Estoque nao pode ser negativo.
          } @else {
            &nbsp;
          }
        </small>
      </label>

      <label class="product-form__full-width">
        Descricao
        <textarea rows="4" formControlName="description"></textarea>
        <small class="product-form__error">
          @if (controls.description.touched && controls.description.hasError('required')) {
            Descricao e obrigatoria.
          } @else {
            &nbsp;
          }
        </small>
      </label>

      @if (submitError()) {
        <p class="product-form__feedback product-form__feedback--error">{{ submitError() }}</p>
      }

      <div class="product-form__actions">
        <button class="product-form__secondary-btn" type="button" (click)="onCancel()">Cancelar</button>
        <button class="product-form__primary-btn" type="submit" [disabled]="isSubmitting()">
          {{ isSubmitting() ? 'Salvando...' : 'Salvar' }}
        </button>
      </div>
    </form>
  }
</section>

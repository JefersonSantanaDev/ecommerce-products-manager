@if (message(); as content) {
  <div
    class="feedback-toast"
    [class.feedback-toast--error]="variant() === 'error'"
    [class.feedback-toast--info]="variant() === 'info'"
    [style.--toast-duration]="autoCloseMs() + 'ms'"
    role="status"
    aria-live="polite"
  >
    <div class="feedback-toast__icon" aria-hidden="true">
      @switch (variant()) {
        @case ('error') {
          !
        }
        @case ('info') {
          i
        }
        @default {
          <svg viewBox="0 0 24 24">
            <path
              d="M5.5 12.2 9.7 16.5 18.5 7.5"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2.2"
            />
          </svg>
        }
      }
    </div>

    <div class="feedback-toast__content">
      <p>{{ content }}</p>
    </div>

    <span class="feedback-toast__progress" aria-hidden="true"></span>
  </div>
}

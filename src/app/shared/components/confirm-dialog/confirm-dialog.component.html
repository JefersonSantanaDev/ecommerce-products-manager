@if (isOpen()) {
  <div
    class="confirm-dialog__backdrop"
    role="button"
    tabindex="0"
    aria-label="Fechar janela de confirmação"
    (click)="onBackdropClick($event)"
    (keydown.enter)="onCancel()"
    (keydown.space)="onCancel(); $event.preventDefault()"
    (keydown.escape)="onCancel()"
  >
    <section class="confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="confirm-dialog-title">
      <h2 id="confirm-dialog-title">{{ title() }}</h2>
      <p>
        {{ description() }}
        @if (highlightText()) {
          <strong>{{ highlightText() }}</strong>
        }
        ?
      </p>

      <div class="confirm-dialog__actions">
        <button
          type="button"
          class="confirm-dialog__button confirm-dialog__button--ghost"
          [disabled]="isBusy()"
          (click)="onCancel()"
        >
          {{ cancelLabel() }}
        </button>
        <button
          type="button"
          class="confirm-dialog__button"
          [class.confirm-dialog__button--danger]="confirmVariant() === 'danger'"
          [class.confirm-dialog__button--primary]="confirmVariant() === 'primary'"
          [disabled]="isBusy()"
          (click)="onConfirm()"
        >
          {{ isBusy() ? 'Processando...' : confirmLabel() }}
        </button>
      </div>
    </section>
  </div>
}
